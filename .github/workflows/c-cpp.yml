name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential autoconf automake libtool pkg-config

    - name: Configure
      run: ./configure || echo "No configure script found"

    - name: Build
      run: make

    - name: Run tests
      run: make check || echo "Tests failed"

    - name: Distcheck
      run: make distcheck || echo "Distcheck failed"
